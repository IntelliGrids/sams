<script>
const SB_URL='https://sverhycdussadqcoztiv.supabase.co',SB_KEY='sb_publishable_xnSJH6SYvEAoJMht7Nu54g_EadsxYL2';
const db=window.supabase.createClient(SB_URL,SB_KEY);
const SLDC_PW='sldc@master2026';

// ═══ STATE ═══
const S={screen:'login',tab:'submit',loading:false,toast:{msg:'',err:false,show:false},
nodals:[],selectedNodal:null,pw:'',loginErr:'',loginMode:'operator',
eventTypes:[],causeCategories:[],fieldDefs:[],etFields:{},utilities:[],
stations:[],elements:{},events:[],form:mkF(),
adminUnlocked:false,sldcUnlocked:false,
modal:null,md:{},restoreEvt:null,restoreForm:{event_time_end:'',restoration_remarks:'',corrective_action:''},
sldcEvents:[],sldcFilter:{nodal_id:'',event_type_id:'',status:'',date_from:'',date_to:'',is_grid_disturbance:''},sldcView:'config',
sldcRefreshTimer:null,sldcSoundOn:true,sldcLastCount:0,sldcNewCount:0,
sldcReportShift:'',sldcReportExcluded:{}};
function mkF(){return{station_id:'',event_type_id:'',cause_category_id:'',substation:'',voltage_level:'',load_mw:'',gen_mw:'',line_name:'',equipment_name:'',reason:'',area_affected:'',event_time_start:'',event_time_end:'',is_ongoing:false,is_grid_disturbance:false,dynamic_fields:{},affected_elements:[],curtailment_entries:[],remarks:'',corrective_action:''}}

// ═══ HELPERS ═══
const $=s=>document.querySelector(s);
const $$=s=>document.querySelectorAll(s);
function toast(m,e=false){S.toast={msg:m,err:e,show:true};render();setTimeout(()=>{S.toast.show=false;render()},2500)}
function setL(v){S.loading=v;render()}
function now(){return new Date().toISOString()}
function fT(iso){if(!iso)return'';try{return new Date(iso).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'})}catch{return''}}
function fD(iso){if(!iso)return'';try{return new Date(iso).toLocaleDateString('en-IN',{weekday:'short',day:'numeric',month:'short'})}catch{return''}}
function fDT(iso){if(!iso)return'';try{return new Date(iso).toLocaleString('en-IN',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'})}catch{return''}}
function l2i(v){return v?new Date(v).toISOString():null}
function i2l(iso){if(!iso)return'';const d=new Date(iso),o=d.getTimezoneOffset();return new Date(d.getTime()-o*60000).toISOString().slice(0,16)}
function esc(s){return(s||'').replace(/"/g,'&quot;').replace(/</g,'&lt;')}
function curShift(){const h=new Date().getHours(),m=new Date().getMinutes();if(h<9||(h===9&&m<30))return'07:00';if(h<21)return'09:00';return'21:00'}
function shiftLabel(s){return s==='07:00'?'Night (07:00)':s==='09:00'?'Morning (09:00)':'Evening (21:00)'}
function genReportMsg(evts){
let msg='*MSETCL SLDC Airoli*\n*Event Report - '+new Date().toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'})+'*\n';
msg+='*Shift: '+shiftLabel(S.sldcReportShift||curShift())+'*\n\n';
if(!evts.length){msg+='No reportable events.\n';return msg}
let idx=1;
evts.forEach(ev=>{
msg+=idx+') *'+ev.event_type_name+'*\n';
msg+='Station: '+ev.station_name+' ('+ev.nodal_centre_name+')\n';
if(ev.substation)msg+='Substation: '+ev.substation+'\n';
if(ev.line_name)msg+='Line: '+ev.line_name+'\n';
if(ev.equipment_name)msg+='Equipment: '+ev.equipment_name+'\n';
msg+='Time: '+fDT(ev.event_time_start)+(ev.event_time_end?' to '+fT(ev.event_time_end):'')+(ev.is_ongoing?' (ongoing)':'')+'\n';
if(ev.load_mw)msg+='Load affected: '+ev.load_mw+' MW\n';
if(ev.gen_mw)msg+='Gen affected: '+ev.gen_mw+' MW\n';
if(ev.reason)msg+='Reason: '+ev.reason+'\n';
if(ev.corrective_action)msg+='Action: '+ev.corrective_action+'\n';
if(ev.is_grid_disturbance)msg+='*[Grid Disturbance]*\n';
msg+='\n';idx++});
msg+='Total events: '+evts.length+'\n';
const tlm=evts.reduce((s,e)=>s+(parseFloat(e.load_mw)||0),0);
const tgm=evts.reduce((s,e)=>s+(parseFloat(e.gen_mw)||0),0);
if(tlm)msg+='Total load affected: '+tlm.toFixed(2)+' MW\n';
if(tgm)msg+='Total gen affected: '+tgm.toFixed(2)+' MW\n';
return msg}

// ═══ DB OPERATIONS ═══
async function loadCfg(){
const[nc,et,cc,fd,etf,ut]=await Promise.all([
db.from('nodal_centres').select('*').eq('active',true).order('name'),
db.from('event_types').select('*').eq('active',true).order('display_order'),
db.from('cause_categories').select('*').eq('active',true).order('display_order'),
db.from('field_definitions').select('*').eq('active',true).order('display_order'),
db.from('event_type_fields').select('*').order('display_order'),
db.from('utility_companies').select('*').eq('active',true).order('name')]);
S.nodals=nc.data||[];S.eventTypes=et.data||[];S.causeCategories=cc.data||[];S.fieldDefs=fd.data||[];S.utilities=ut.data||[];
const a=etf.data||[];S.etFields={};
S.eventTypes.forEach(e=>{const ls=a.filter(l=>l.event_type_id===e.id);
S.etFields[e.id]=ls.map(l=>{const f=S.fieldDefs.find(x=>x.id===l.field_id);if(!f)return null;
return{field_id:l.field_id,etf_id:l.id,code:f.code,label:f.label,type:f.field_type,config:f.config||{},required:l.is_required,order:l.display_order,description:f.description}}).filter(Boolean).sort((a,b)=>a.order-b.order)})}

async function loadSt(nid){const{data}=await db.from('stations').select('*').eq('nodal_centre_id',nid).eq('active',true).order('name');S.stations=data||[]}
async function loadAllEl(){const ids=S.stations.map(s=>s.id);if(!ids.length)return;const{data}=await db.from('station_elements').select('*').in('station_id',ids).eq('active',true).order('name');S.elements={};(data||[]).forEach(el=>{if(!S.elements[el.station_id])S.elements[el.station_id]=[];S.elements[el.station_id].push(el)})}
async function loadEl(sid){const{data}=await db.from('station_elements').select('*').eq('station_id',sid).eq('active',true).order('name');S.elements[sid]=data||[]}
async function loadEv(nid){const d=new Date();d.setDate(d.getDate()-7);const{data}=await db.from('station_events').select('*').eq('nodal_centre_id',nid).gte('event_time_start',d.toISOString()).order('event_time_start',{ascending:false});S.events=data||[]}

async function loadSldcEvents(){
const f=S.sldcFilter;let q=db.from('station_events').select('*');
const d=new Date();d.setDate(d.getDate()-7);
if(f.date_from)q=q.gte('event_time_start',new Date(f.date_from).toISOString());
else q=q.gte('event_time_start',d.toISOString());
if(f.date_to)q=q.lte('event_time_start',new Date(f.date_to+'T23:59:59').toISOString());
if(f.nodal_id)q=q.eq('nodal_centre_id',parseInt(f.nodal_id));
if(f.event_type_id)q=q.eq('event_type_id',parseInt(f.event_type_id));
if(f.status==='open')q=q.eq('event_status','open');
else if(f.status==='closed')q=q.eq('event_status','closed');
else if(f.status==='pending')q=q.eq('sldc_status','pending');
else if(f.status==='accepted')q=q.eq('sldc_status','accepted');
if(f.is_grid_disturbance==='yes')q=q.eq('is_grid_disturbance',true);
q=q.order('event_time_start',{ascending:false}).limit(200);
const{data}=await q;S.sldcEvents=data||[]}

// ═══ CRUD OPERATIONS ═══
async function upsertStation(d){
if(d.id){const{error}=await db.from('stations').update({name:d.name,voltage_level:d.voltage_level,licensee:d.licensee,bus_configuration:d.bus_configuration}).eq('id',d.id);if(error)throw error}
else{const{error}=await db.from('stations').insert([{nodal_centre_id:S.selectedNodal.id,name:d.name,voltage_level:d.voltage_level,licensee:d.licensee,bus_configuration:d.bus_configuration}]);if(error)throw error}
await loadSt(S.selectedNodal.id)}

async function softDeleteStation(id){const{error}=await db.from('stations').update({active:false}).eq('id',id);if(error)throw error;await loadSt(S.selectedNodal.id)}

async function upsertElement(d){
if(d.id){const{error}=await db.from('station_elements').update({name:d.name,element_type:d.element_type,voltage_level:d.voltage_level,details:d.details,terminal_station_1:d.terminal_station_1,terminal_station_2:d.terminal_station_2,terminal_station_3:d.terminal_station_3,equipment_subtype:d.equipment_subtype}).eq('id',d.id);if(error)throw error}
else{const{error}=await db.from('station_elements').insert([{station_id:d.station_id,name:d.name,element_type:d.element_type,voltage_level:d.voltage_level,details:d.details,terminal_station_1:d.terminal_station_1,terminal_station_2:d.terminal_station_2,terminal_station_3:d.terminal_station_3,equipment_subtype:d.equipment_subtype}]);if(error)throw error}
await loadAllEl()}

async function softDeleteElement(id){const{error}=await db.from('station_elements').update({active:false}).eq('id',id);if(error)throw error;await loadAllEl()}

async function upsertEventType(d){
if(d.id){const{error}=await db.from('event_types').update({code:d.code,name:d.name,description:d.description,impact_categories:d.impact_categories,display_order:d.display_order}).eq('id',d.id);if(error)throw error}
else{const{data,error}=await db.from('event_types').insert([{code:d.code,name:d.name,description:d.description,impact_categories:d.impact_categories,display_order:d.display_order||99}]).select();if(error)throw error;d.id=data[0].id}
// Update field mappings - delete existing, re-insert
if(d.field_mappings){
await db.from('event_type_fields').delete().eq('event_type_id',d.id);
if(d.field_mappings.length){const rows=d.field_mappings.map(fm=>({event_type_id:d.id,field_id:fm.field_id,is_required:fm.is_required,display_order:fm.display_order||99}));
const{error:e2}=await db.from('event_type_fields').insert(rows);if(e2)throw e2}}
await loadCfg()}

async function softDeleteEventType(id){const{error}=await db.from('event_types').update({active:false}).eq('id',id);if(error)throw error;await loadCfg()}

async function upsertFieldDef(d){
const config={};
if(d.field_type==='SELECT'&&d.options)config.options=d.options;
if(d.field_type==='NUMBER'){config.min=d.min??0;config.step=d.step??1}
if(d.id){const{error}=await db.from('field_definitions').update({label:d.label,field_type:d.field_type,config,description:d.description||null,display_order:d.display_order||99}).eq('id',d.id);if(error)throw error}
else{const{error}=await db.from('field_definitions').insert([{code:d.code,label:d.label,field_type:d.field_type,config,description:d.description||null,display_order:d.display_order||99}]);if(error)throw error}
await loadCfg()}

else{const{error}=await db.from('cause_categories').insert([{name:d.name,description:d.description,display_order:d.display_order||99}]);if(error)throw error}
await loadCfg()}

async function softDeleteCauseCat(id){const{error}=await db.from('cause_categories').update({active:false}).eq('id',id);if(error)throw error;await loadCfg()}

else{const{error}=await db.from('utility_companies').insert([{name:d.name,short_code:d.short_code,utility_type:d.utility_type}]);if(error)throw error}

async function submitEvent(f){
const st=S.stations.find(s=>s.id==f.station_id),et=S.eventTypes.find(e=>e.id==f.event_type_id),cc=S.causeCategories.find(c=>c.id==f.cause_category_id);
if(!st||!et)throw new Error('Missing station or event type');
const n=now();
const p={submission_id:crypto.randomUUID?.()??(''+Date.now()),
nodal_centre_id:S.selectedNodal.id,nodal_centre_name:S.selectedNodal.name,
station_id:parseInt(f.station_id),station_name:st.name,
event_type_id:et.id,event_type_code:et.code,event_type_name:et.name,
cause_category_id:cc?.id||null,cause_category_name:cc?.name||null,
substation:f.substation||null,voltage_level:f.voltage_level||null,
load_mw:f.load_mw?parseFloat(f.load_mw):null,gen_mw:f.gen_mw?parseFloat(f.gen_mw):null,
line_name:f.line_name||null,equipment_name:f.equipment_name||null,
reason:f.reason||null,area_affected:f.area_affected||null,
dynamic_fields:f.dynamic_fields||{},affected_elements:f.affected_elements||[],
event_time_start:l2i(f.event_time_start),event_time_end:f.is_ongoing?null:l2i(f.event_time_end),
is_ongoing:f.is_ongoing,is_grid_disturbance:f.is_grid_disturbance||false,
reporting_time:n,event_status:f.is_ongoing?'open':(f.event_time_end?'closed':'open'),

const fgm=$('#f-gm');if(fgm)fgm.oninput=function(){S.form.gen_mw=this.value};
const fln=$('#f-ln');if(fln)fln.oninput=function(){S.form.line_name=this.value};

const farea=$('#f-area');if(farea)farea.oninput=function(){S.form.area_affected=this.value};
const fca=$('#f-ca');if(fca)fca.oninput=function(){S.form.corrective_action=this.value};
const frem=$('#f-rem');if(frem)frem.oninput=function(){S.form.remarks=this.value};
$$('[data-dyn]').forEach(el=>{el.oninput=el.onchange=function(){S.form.dynamic_fields[this.dataset.dyn]=this.value}});
const bsub=$('#b-submit');if(bsub)bsub.onclick=doSubmit;

$$('[data-ae-tm]').forEach(el=>el.onchange=function(){S.form.affected_elements[this.dataset.aeTm].time=this.value});
$$('[data-ae-lm]').forEach(el=>el.oninput=function(){S.form.affected_elements[this.dataset.aeLm].load_mw=this.value});
$$('[data-ae-gm]').forEach(el=>el.oninput=function(){S.form.affected_elements[this.dataset.aeGm].gen_mw=this.value});

// History
$$('[data-restore]').forEach(b=>b.onclick=function(){const ev=S.events.find(e=>e.id==this.dataset.restore);if(!ev)return;S.restoreEvt=ev;S.restoreForm={event_time_end:'',restoration_remarks:'',corrective_action:ev.corrective_action||''};S.modal='restore';render()});

if(!d.name){toast('Name required',true);return}setL(true);try{await upsertStation(d);S.modal=null;toast('Saved')}catch(e){toast(e.message,true)}setL(false)};

const bdoel=$('#b-do-el');if(bdoel)bdoel.onclick=async function(){const d={...S.md,name:$('#m-en')?.value,element_type:$('#m-ety')?.value,voltage_level:$('#m-evl')?.value||null,details:$('#m-edt')?.value||null,terminal_station_1:$('#m-et1')?.value||null,terminal_station_2:$('#m-et2')?.value||null};

$$('[data-cat]').forEach(p=>p.onclick=function(){const c=this.dataset.cat;const cats=S.md.impact_categories||[];const idx=cats.indexOf(c);if(idx>=0)cats.splice(idx,1);else cats.push(c);S.md.impact_categories=cats;render()});
// Field include checkbox - toggle adds/removes from field_mappings and re-renders
$$('[data-fm]').forEach(cb=>cb.onchange=function(){
const fid=parseInt(this.dataset.fm);
if(!S.md.field_mappings)S.md.field_mappings=[];
if(this.checked){
// Add to mappings with next available order
const maxOrd=S.md.field_mappings.reduce((m,f)=>Math.max(m,f.display_order||0),0);
S.md.field_mappings.push({field_id:fid,is_required:false,display_order:maxOrd+1});
}else{
S.md.field_mappings=S.md.field_mappings.filter(m=>m.field_id!==fid);
}
// Also capture any existing Req/Order values before re-render
S.md.field_mappings.forEach(fm=>{
const rq=$('[data-fmr="'+fm.field_id+'"]');if(rq)fm.is_required=rq.checked;
const ord=$('[data-fmo="'+fm.field_id+'"]');if(ord&&ord.value)fm.display_order=parseInt(ord.value)||99;
});
// Capture other form fields before re-render
S.md.code=$('#m-etc')?.value||S.md.code;
S.md.name=$('#m-etn')?.value||S.md.name;
S.md.description=$('#m-etd')?.value||S.md.description;
render()});
const bdoet=$('#b-do-et');if(bdoet)bdoet.onclick=async function(){
const d={...S.md,code:$('#m-etc')?.value,name:$('#m-etn')?.value,description:$('#m-etd')?.value||null};
const mappings=[];
S.fieldDefs.forEach(fd=>{const cb=$('[data-fm="'+fd.id+'"]');const rq=$('[data-fmr="'+fd.id+'"]');const ord=$('[data-fmo="'+fd.id+'"]');
if(cb?.checked)mappings.push({field_id:fd.id,is_required:rq?.checked||false,display_order:parseInt(ord?.value)||99})});
mappings.sort((a,b)=>a.display_order-b.display_order);
d.field_mappings=mappings;
if(!d.code||!d.name){toast('Code and name required',true);return}
setL(true);try{await upsertEventType(d);S.modal=null;toast('Saved')}catch(e){toast(e.message,true)}setL(false)};

// Cause Category CRUD
const bacc=$('#b-add-cc');if(bacc)bacc.onclick=function(){S.md={};S.modal='cause';render()};
$$('[data-edit-cc]').forEach(b=>b.onclick=function(){const c=S.causeCategories.find(x=>x.id==this.dataset.editCc);if(c)S.md={...c};S.modal='cause';render()});
$$('[data-del-cc]').forEach(b=>b.onclick=async function(){if(!confirm('Deactivate?'))return;setL(true);try{await softDeleteCauseCat(parseInt(this.dataset.delCc));toast('Deactivated')}catch(e){toast(e.message,true)}setL(false)});
const bdocc=$('#b-do-cc');if(bdocc)bdocc.onclick=async function(){const d={...S.md,name:$('#m-ccn')?.value,description:$('#m-ccd')?.value||null};
if(!d.name){toast('Name required',true);return}setL(true);try{await upsertCauseCat(d);S.modal=null;toast('Saved')}catch(e){toast(e.message,true)}setL(false)};

// Utility CRUD
const baut=$('#b-add-ut');if(baut)baut.onclick=function(){S.md={utility_type:'TRANSMISSION'};S.modal='utility';render()};
$$('[data-edit-ut]').forEach(b=>b.onclick=function(){const u=S.utilities.find(x=>x.id==this.dataset.editUt);if(u)S.md={...u};S.modal='utility';render()});
$$('[data-del-ut]').forEach(b=>b.onclick=async function(){if(!confirm('Deactivate?'))return;setL(true);try{await softDeleteUtility(parseInt(this.dataset.delUt));toast('Deactivated')}catch(e){toast(e.message,true)}setL(false)});
const bdout=$('#b-do-ut');if(bdout)bdout.onclick=async function(){const d={...S.md,name:$('#m-utn')?.value,short_code:$('#m-utc')?.value,utility_type:$('#m-utt')?.value};
if(!d.name||!d.short_code){toast('Name and code required',true);return}setL(true);try{await upsertUtility(d);S.modal=null;toast('Saved')}catch(e){toast(e.message,true)}setL(false)};

// Field Definition CRUD
const bafd=$('#b-add-fd');if(bafd)bafd.onclick=function(){S.md={field_type:'TEXT',config:{},display_order:99};S.modal='fieldmaster';render()};
$$('[data-edit-fd]').forEach(b=>b.onclick=function(){const fd=S.fieldDefs.find(x=>x.id==this.dataset.editFd);if(fd)S.md={...fd};S.modal='fieldmaster';render()});
$$('[data-del-fd]').forEach(b=>b.onclick=async function(){if(!confirm('Deactivate this field? It will be hidden from future use but preserved in historical events.'))return;setL(true);try{await softDeleteFieldDef(parseInt(this.dataset.delFd));toast('Field deactivated')}catch(e){toast(e.message,true)}setL(false)});
const bdofd=$('#b-do-fd');if(bdofd)bdofd.onclick=async function(){
const d={...S.md,label:$('#m-fdl')?.value,field_type:$('#m-fdt')?.value,description:$('#m-fdh')?.value||null,display_order:parseInt($('#m-fdo')?.value)||99};
if(!d.id)d.code=$('#m-fdc')?.value;
if(d.field_type==='SELECT'){const raw=$('#m-fdopts')?.value||'';d.options=raw.split('\n').map(s=>s.trim()).filter(Boolean)}
if(d.field_type==='NUMBER'){d.min=parseFloat($('#m-fdmin')?.value)||0;d.step=parseFloat($('#m-fdstep')?.value)||1}
if(!d.code||!d.label||!d.field_type){toast('Code, label and type required',true);return}
setL(true);try{await upsertFieldDef(d);S.modal=null;toast('Field saved')}catch(e){toast(e.message,true)}setL(false)};

// Concurrence
const bdoconcur=$('#b-do-concur');if(bdoconcur)bdoconcur.onclick=async function(){const reason=$('#m-cr')?.value;setL(true);try{await sldcConcur(S.md.evId,reason);await loadSldcEvents();await loadEv(S.selectedNodal?.id);S.modal=null;toast('Event concurred')}catch(e){toast(e.message,true)}setL(false)};

// Report preview copy
const bcrpt=$('#b-copy-rpt');if(bcrpt)bcrpt.onclick=function(){const msg=$('#m-rpt-msg')?.value||'';navigator.clipboard?.writeText(msg).then(()=>{toast('Copied!');S.modal=null;render()}).catch(()=>toast('Copy failed',true))};

// SLDC view toggle
$$('[data-sv]').forEach(b=>b.onclick=async function(){S.sldcView=this.dataset.sv;
if(S.sldcView==='events'&&!S.sldcEvents.length){setL(true);await loadSldcEvents();S.sldcLastCount=S.sldcEvents.length;setL(false)}
// Start auto-refresh when entering events view
if(S.sldcView==='events'&&!S.sldcRefreshTimer){
S.sldcRefreshTimer=setInterval(async()=>{
if(S.sldcView!=='events'||S.tab!=='sldc')return;
const prevCount=S.sldcEvents.length;
await loadSldcEvents();
const newCount=S.sldcEvents.length;
if(newCount>prevCount){S.sldcNewCount=newCount-prevCount;
if(S.sldcSoundOn){try{const ac=new(window.AudioContext||window.webkitAudioContext)();const o=ac.createOscillator();const g=ac.createGain();o.connect(g);g.connect(ac.destination);o.frequency.value=800;g.gain.value=0.15;o.start();o.stop(ac.currentTime+0.15)}catch(e){}}
render()}else{render()}},60000)}
if(S.sldcView==='config'&&S.sldcRefreshTimer){clearInterval(S.sldcRefreshTimer);S.sldcRefreshTimer=null}
render()});

// Sound toggle
const bsnd=$('#b-snd-tog');if(bsnd)bsnd.onclick=function(){S.sldcSoundOn=!S.sldcSoundOn;render()};

// Report shift selection
$$('[data-rshift]').forEach(b=>b.onclick=function(){S.sldcReportShift=this.dataset.rshift;S.sldcReportExcluded={};render()});

// Report checkboxes
$$('[data-rpt-cb]').forEach(cb=>cb.onchange=function(){const id=parseInt(this.dataset.rptCb);if(this.checked)delete S.sldcReportExcluded[id];else S.sldcReportExcluded[id]=true;render()});

// Generate message
const bgen=$('#b-gen-msg');if(bgen)bgen.onclick=function(){
const rShift=S.sldcReportShift||curShift();
const reportEvts=S.sldcEvents.filter(e=>e.sldc_status==='accepted'&&e.shift_period===rShift&&!S.sldcReportExcluded[e.id]);
const msg=genReportMsg(reportEvts);
S.md={generatedMsg:msg};S.modal='reportpreview';render()};

// Copy message
const bcopy=$('#b-copy-msg');if(bcopy)bcopy.onclick=function(){
const rShift=S.sldcReportShift||curShift();
const reportEvts=S.sldcEvents.filter(e=>e.sldc_status==='accepted'&&e.shift_period===rShift&&!S.sldcReportExcluded[e.id]);
const msg=genReportMsg(reportEvts);
navigator.clipboard?.writeText(msg).then(()=>toast('Copied to clipboard')).catch(()=>toast('Copy failed',true))};

// SLDC filters
const bsf=$('#b-sf-apply');if(bsf)bsf.onclick=async function(){
S.sldcFilter.nodal_id=$('#sf-nc')?.value||'';
S.sldcFilter.event_type_id=$('#sf-et')?.value||'';
S.sldcFilter.status=$('#sf-st')?.value||'';
S.sldcFilter.is_grid_disturbance=$('#sf-gd')?.value||'';
S.sldcFilter.date_from=$('#sf-df')?.value||'';
S.sldcFilter.date_to=$('#sf-dt')?.value||'';
setL(true);await loadSldcEvents();setL(false);render()};

// SLDC accept/dismiss
$$('[data-accept]').forEach(b=>b.onclick=async function(){setL(true);try{await sldcAccept(parseInt(this.dataset.accept));await loadSldcEvents();toast('Event accepted')}catch(e){toast(e.message,true)}setL(false)});
$$('[data-dismiss]').forEach(b=>b.onclick=async function(){const rm=prompt('Dismiss reason (optional):');setL(true);try{await sldcDismiss(parseInt(this.dataset.dismiss),rm);await loadSldcEvents();toast('Event dismissed')}catch(e){toast(e.message,true)}setL(false)});

// Cancel + modal bg
const bc=$('#b-cancel');if(bc)bc.onclick=function(){S.modal=null;render()};
const mbg=$('#mbg');if(mbg)mbg.onclick=function(e){if(e.target===this){S.modal=null;render()}}}

// ═══ INIT ═══
async function init(){setL(true);try{await loadCfg()}catch(e){console.error(e);toast('Cannot connect',true)}setL(false)}
init();
</script>
</body>
</html>
